<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Costco Cart Transfer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="ph">
      <div class="ph-row">
        <span class="ph-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="16" fill="#fff" />
            <g fill="none" stroke="#cb3a3a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 6 21.5 11 8.5 11" />
              <path d="M21.5 11 10.5 21" />
              <path d="M16 26 10.5 21 23.5 21" />
            </g>
          </svg>
        </span>
        <span class="ph-word">Costco Cart Transfer</span>
      </div>
      <div class="ph-route">
        <span id="route-dot" class="ph-dot warn"></span>
        <span>Instacart → Costco Same-Day</span>
      </div>
    </header>

    <main class="body">
      <div id="status" class="status s-info">
        <span id="status-ico" class="st-ico" aria-hidden="true"></span>
        <div class="st-main">
          <div id="status-kicker" class="st-kicker">Checking</div>
          <div id="status-title" class="st-title">Checking tabs…</div>
          <div id="status-track" class="st-track" hidden><div class="st-fill"></div></div>
        </div>
      </div>

      <section id="controls" class="actions" hidden>
        <button id="transfer" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 4 3 8l4 4" /><path d="M3 8h14" />
            <path d="M17 20l4-4-4-4" /><path d="M21 16H7" />
          </svg>
          Transfer cart to Same-Day
        </button>
        <div class="btn-row">
          <button id="open-instacart" class="btn btn-secondary" hidden>Open Instacart</button>
          <button id="open-sameday" class="btn btn-secondary" hidden>Open Sameday</button>
          <button id="clear-instacart" class="btn btn-secondary" hidden>Clear Instacart cart</button>
        </div>
        <div id="clear-confirm" hidden>
          <span class="clear-confirm-label">Remove all items from Instacart cart?</span>
          <button id="clear-confirm-yes" class="btn btn-danger">Yes, clear</button>
          <button id="clear-confirm-no" class="btn btn-secondary">Cancel</button>
        </div>
      </section>

      <section id="result" hidden>
        <h2 id="result-outcome"></h2>
        <p id="result-summary"></p>
        <div id="result-counts"></div>
        <details>
          <summary>Per-item details</summary>
          <table id="result-table">
            <thead>
              <tr><th>Status</th><th>Product</th><th>Qty</th><th>IC $</th><th>SD $</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </details>
        <div id="result-warnings"></div>
      </section>

      <section id="history" hidden>
        <div class="hist-head">
          <h3>Past transfers</h3>
          <span id="history-count" class="hist-count"></span>
        </div>
        <div id="history-list"></div>
        <button id="clear-history" class="btn btn-ghost">Clear history</button>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
